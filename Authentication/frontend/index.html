<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-animation">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>
  
  <div class="container">
    <div class="header">
      <div class="logo-icon">🔐</div>
      <h1 class="main-title">Welcome</h1>
      <p class="subtitle">Secure Authentication Portal</p>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" data-tab="register">Register</button>
      <button class="tab-btn" data-tab="login">Login</button>
    </div>
    
    <div class="form-container">
      <div class="form-wrapper active" id="register-section">
        <h2>Create Account</h2>
        <form id="registerForm">
          <div class="input-group">
            <label for="regUsername">Username</label>
            <input type="text" id="regUsername" placeholder="Enter username" required>
          </div>
          <div class="input-group">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn-submit">
            <span>Create Account</span>
            <span class="btn-icon">→</span>
          </button>
          <p id="registerMsg" class="message"></p>
        </form>
      </div>
      
      <div class="form-wrapper" id="login-section">
        <h2>Welcome Back</h2>
        <form id="loginForm">
          <div class="input-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username" required>
          </div>
          <div class="input-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn-submit">
            <span>Sign In</span>
            <span class="btn-icon">→</span>
          </button>
          <p id="loginMsg" class="message"></p>
        </form>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
